<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="perfil-bg">
  <div class="perfil-wrapper">

    <div class="header-section">
      <div class="logo-mini">
        <span class="c-text">C</span>
        <span class="leaf-icon">🌱</span>
      </div>
      <h2 class="title">SEU PERFIL</h2>
      <div class="progress-bar">
        <div class="step active"></div>
        <div class="step"></div>
        <div class="step"></div>
      </div>
    </div>

    <div class="form-section">

      <div class="row-group mt-15">
        <ion-item lines="none" class="custom-input half">
          <ion-label position="stacked" class="activity-label">Idade</ion-label>
          <ion-input type="number" placeholder="Ex: 25" [(ngModel)]="idade"></ion-input>
        </ion-item>

        <div style="width: 48%; display: flex; flex-direction: column;">
          <span style="color: #7f8c8d; font-size: 12px; margin-bottom: 2px; margin-left: 2px; font-weight: 600;">Gênero</span>
          <div class="gender-selector" style="width: 100%;">
            <div class="gender-btn" [class.active]="genero === 'M'" (click)="selecionarGenero('M')">
              <ion-icon name="male-outline"></ion-icon>
            </div>
            <div class="gender-btn" [class.active]="genero === 'F'" (click)="selecionarGenero('F')">
              <ion-icon name="female-outline"></ion-icon>
            </div>
          </div>
        </div>
      </div>

      <div class="row-group mt-15">
        <ion-item lines="none" class="custom-input half">
          <ion-label position="stacked" class="activity-label">Peso (kg)</ion-label>
          <ion-input type="number" placeholder="Ex: 70" [(ngModel)]="peso"></ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input half">
          <ion-label position="stacked" class="activity-label">Altura (cm)</ion-label>
          <ion-input type="number" placeholder="Ex: 175" [(ngModel)]="altura"></ion-input>
        </ion-item>
      </div>

      <ion-item lines="none" class="custom-input mt-15">
        <ion-label position="stacked" class="activity-label">Nível de Atividade</ion-label>
        <ion-select [(ngModel)]="nivelAtividade" interface="popover" class="activity-select">
          <ion-select-option value="sedentario">Sedentário, Leve, Moderado, Ativo</ion-select-option>
          <ion-select-option value="leve">Leve (1 a 2x na semana)</ion-select-option>
          <ion-select-option value="moderado">Moderado (3 a 5x na semana)</ion-select-option>
          <ion-select-option value="ativo">Ativo (6 a 7x na semana)</ion-select-option>
        </ion-select>
      </ion-item>

      <p class="section-label center mt-30">SEU OBJETIVO</p>
      <div class="objective-group">

        <div class="objective-card" [class.active]="objetivo === 'perder'" (click)="selecionarObjetivo('perder')">
          <ion-icon name="scale-outline"></ion-icon>
          <span>Perder<br>Peso</span>
        </div>

        <div class="objective-card" [class.active]="objetivo === 'manter'" (click)="selecionarObjetivo('manter')">
          <ion-icon name="barbell-outline"></ion-icon>
          <span>Manter<br>Peso</span>
        </div>

        <div class="objective-card" [class.active]="objetivo === 'ganhar'" (click)="selecionarObjetivo('ganhar')">
          <ion-icon name="trending-up-outline"></ion-icon>
          <span>Ganhar<br>Peso</span>
        </div>

      </div>

      <ion-button expand="block" class="btn-primary mt-30" (click)="avancar()">
        PRÓXIMO
      </ion-button>

      <ion-button expand="block" class="btn-primary mt-30" (click)="voltar()">
        Voltar
      </ion-button>

    </div>
  </div>
</ion-content>
